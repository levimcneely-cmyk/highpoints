<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --forest: #1a2e1a;
  --forest-mid: #2d4a2a;
  --moss: #a3c47a;
  --moss-light: #c8dfa8;
  --stone: #f5f0e8;
  --stone-dim: rgba(245,240,232,0.55);
  --card-bg: rgba(255,255,255,0.04);
  --card-border: rgba(163,196,122,0.2);
}
body { font-family:'Inter',sans-serif; background:var(--forest); color:var(--stone); min-height:100vh; }

nav {
  display:flex; align-items:center; justify-content:space-between;
  padding:1.1rem 2rem;
  border-bottom:0.5px solid rgba(163,196,122,0.2);
  position:sticky; top:0; z-index:100; background:var(--forest);
}
.nav-logo { font-family:'Playfair Display',serif; font-size:20px; color:var(--stone); text-decoration:none; }
.nav-logo span { color:var(--moss); }
.nav-links { display:flex; gap:1.75rem; align-items:center; }
nav a { color:var(--moss-light); text-decoration:none; font-size:13px; font-weight:500; opacity:0.8; transition:opacity 0.15s; }
nav a:hover { opacity:1; }
.back-link { display:inline-flex; align-items:center; gap:6px; color:var(--moss-light); text-decoration:none; font-size:13px; padding:1.25rem 2rem 0; opacity:0.7; transition:opacity 0.15s; }
.back-link:hover { opacity:1; }

/* ── HERO ── */
.hero {
  padding:2rem 2rem 2.5rem;
  border-bottom:0.5px solid rgba(163,196,122,0.1);
  display:grid;
  grid-template-columns:1fr auto;
  gap:1.5rem;
  align-items:start;
  max-width:900px;
}
.hero-eyebrow { font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:rgba(163,196,122,0.6); margin-bottom:0.5rem; }
.hero-name { font-family:'Playfair Display',serif; font-size:42px; color:var(--stone); line-height:1.1; margin-bottom:0.3rem; }
.hero-state { font-size:16px; color:var(--moss-light); margin-bottom:1.5rem; }
.hero-badge {
  display:inline-flex; align-items:center; gap:8px;
  padding:8px 18px; border-radius:30px; font-size:13px; font-weight:500;
}
.hero-badge.done { background:rgba(106,181,71,0.15); color:#a3e07a; border:0.5px solid rgba(106,181,71,0.3); }
.hero-badge.todo { background:rgba(163,196,122,0.08); color:rgba(163,196,122,0.6); border:0.5px solid rgba(163,196,122,0.15); }
.hero-elev {
  text-align:right;
}
.elev-num { font-family:'Playfair Display',serif; font-size:52px; color:var(--moss); line-height:1; }
.elev-unit { font-size:13px; color:var(--stone-dim); margin-top:4px; }

/* ── STATS STRIP ── */
.stats-strip {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  border-bottom:0.5px solid rgba(163,196,122,0.1);
  max-width:900px;
}
.strip-stat { padding:1.25rem 2rem; border-right:0.5px solid rgba(163,196,122,0.1); }
.strip-stat:last-child { border-right:none; }
.strip-lbl { font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--stone-dim); margin-bottom:6px; }
.strip-val { font-size:20px; font-weight:500; color:var(--stone); }
.strip-sub { font-size:11px; color:var(--stone-dim); margin-top:2px; }

/* ── DIFFICULTY ── */
.section { padding:2rem 2rem; max-width:900px; }
.section-title { font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:rgba(163,196,122,0.6); margin-bottom:1.25rem; }

.diff-card {
  background:var(--card-bg); border:0.5px solid var(--card-border);
  border-radius:12px; padding:1.5rem;
  display:grid; grid-template-columns:1fr 1fr; gap:1.5rem;
}
.diff-scale-wrap { display:flex; flex-direction:column; gap:10px; }
.diff-row { display:flex; align-items:center; gap:10px; }
.diff-label { font-size:12px; color:var(--stone-dim); width:90px; flex-shrink:0; }
.diff-track { flex:1; height:6px; background:rgba(163,196,122,0.1); border-radius:3px; overflow:hidden; }
.diff-bar { height:100%; border-radius:3px; }
.diff-val { font-size:12px; font-weight:500; color:var(--stone); min-width:28px; text-align:right; }

.effort-display { display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; border-left:0.5px solid rgba(163,196,122,0.15); }
.effort-num { font-family:'Playfair Display',serif; font-size:54px; color:var(--moss); line-height:1; }
.effort-denom { font-size:13px; color:var(--stone-dim); margin-top:4px; }
.effort-label { font-size:11px; color:var(--stone-dim); margin-top:8px; letter-spacing:0.06em; text-transform:uppercase; }
.effort-rank { margin-top:6px; font-size:12px; color:var(--moss-light); }

/* ── TRIP REPORT ── */
.trip-card {
  background:var(--card-bg); border:0.5px solid var(--card-border);
  border-radius:12px; padding:1.5rem;
}
.trip-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:1.25rem; flex-wrap:wrap; gap:8px; }
.trip-title { font-size:15px; font-weight:500; color:var(--stone); }
.trip-date { font-size:13px; color:var(--moss); }
.trip-meta { display:flex; gap:1.5rem; flex-wrap:wrap; margin-bottom:1rem; }
.trip-meta-item { display:flex; flex-direction:column; gap:2px; }
.trip-meta-lbl { font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:var(--stone-dim); }
.trip-meta-val { font-size:13px; color:var(--stone); }
.trip-notes {
  border-top:0.5px solid rgba(163,196,122,0.15);
  padding-top:1rem;
  font-size:14px; line-height:1.7; color:rgba(245,240,232,0.8);
  font-style:italic;
}
.no-summit {
  text-align:center; padding:2.5rem 2rem;
}
.no-summit-icon { font-size:32px; margin-bottom:1rem; opacity:0.4; }
.no-summit-text { font-size:15px; color:var(--stone-dim); margin-bottom:1.25rem; }
.log-btn {
  display:inline-block; background:var(--moss); color:var(--forest);
  text-decoration:none; border-radius:7px; padding:10px 22px;
  font-size:13px; font-weight:500; font-family:'Inter',sans-serif;
  transition:background 0.15s;
}
.log-btn:hover { background:var(--moss-light); }

/* ── LINKS ── */
.links-card {
  background:var(--card-bg); border:0.5px solid var(--card-border);
  border-radius:12px; overflow:hidden;
}
.link-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:1rem 1.25rem;
  border-bottom:0.5px solid rgba(163,196,122,0.1);
  text-decoration:none;
  transition:background 0.15s;
}
.link-row:last-child { border-bottom:none; }
.link-row:hover { background:rgba(163,196,122,0.06); }
.link-row-left { display:flex; align-items:center; gap:10px; }
.link-icon { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; background:rgba(163,196,122,0.1); }
.link-name { font-size:14px; color:var(--stone); }
.link-desc { font-size:12px; color:var(--stone-dim); margin-top:1px; }
.link-arrow { font-size:14px; color:var(--stone-dim); }

/* ── NEARBY ── */
.nearby-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; }
.nearby-card {
  background:var(--card-bg); border:0.5px solid var(--card-border);
  border-radius:10px; padding:1rem 1.1rem;
  text-decoration:none; transition:border-color 0.15s;
  display:block;
}
.nearby-card:hover { border-color:rgba(163,196,122,0.4); }
.nearby-state { font-size:13px; font-weight:500; color:var(--stone); }
.nearby-peak { font-size:11px; color:var(--stone-dim); margin-top:2px; }
.nearby-dist { font-size:11px; color:var(--moss); margin-top:6px; }
.nearby-badge { display:inline-block; font-size:9px; padding:1px 6px; border-radius:10px; margin-top:4px; }
.nearby-badge.done { background:rgba(106,181,71,0.2); color:#a3e07a; }
.nearby-badge.todo { background:rgba(163,196,122,0.08); color:var(--stone-dim); }

footer { border-top:0.5px solid rgba(163,196,122,0.1); padding:1.5rem 2rem; font-size:12px; color:rgba(245,240,232,0.3); display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; }
footer a { color:rgba(163,196,122,0.5); text-decoration:none; }
footer a:hover { color:var(--moss); }

@media (max-width:640px) {
  .hero { grid-template-columns:1fr; }
  .hero-elev { text-align:left; }
  .stats-strip { grid-template-columns:1fr 1fr; }
  .diff-card { grid-template-columns:1fr; }
  .effort-display { border-left:none; border-top:0.5px solid rgba(163,196,122,0.15); padding-top:1rem; }
}
</style>

<script>
const sumMap = {};
SUMMITED.forEach(s => { sumMap[s.state] = s; });

function diffColor(d) {
  if (d <= 2) return '#a3c47a';
  if (d <= 4) return '#d4b96a';
  if (d <= 6) return '#e0895a';
  if (d <= 8) return '#d05540';
  return '#b83030';
}

function effortRank(effort) {
  const sorted = [...HIGHPOINTS].sort((a,b) => b.effort - a.effort);
  const rank = sorted.findIndex(h => h.effort === effort) + 1;
  return '#' + rank + ' most demanding of 50';
}

function elevRank(elev) {
  const sorted = [...HIGHPOINTS].sort((a,b) => b.elev - a.elev);
  const rank = sorted.findIndex(h => h.elev === elev) + 1;
  return '#' + rank + ' highest of 50';
}

function haversineKm(lat1,lng1,lat2,lng2) {
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function buildPage(hp) {
  document.title = hp.peak + ' — Summit Log';
  const log = sumMap[hp.state];
  const isDone = !!log;

  // Nearby (closest 4 excluding self)
  const nearby = HIGHPOINTS
    .filter(h => h.state !== hp.state)
    .map(h => ({ ...h, km: haversineKm(hp.lat, hp.lng, h.lat, h.lng) }))
    .sort((a,b) => a.km - b.km)
    .slice(0, 4);

  const dateStr = log ? (() => {
    const d = new Date(log.date + 'T12:00:00');
    return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  })() : '';

  const html = `
    <!-- HERO -->
    <div class="hero">
      <div>
        <div class="hero-eyebrow">${hp.state} · State Highpoint</div>
        <h1 class="hero-name">${hp.peak}</h1>
        <div class="hero-state">${hp.name}</div>
        <div class="hero-badge ${isDone ? 'done' : 'todo'}">
          ${isDone ? '✓ Summited' : '○ Not yet'}
        </div>
      </div>
      <div class="hero-elev">
        <div class="elev-num">${hp.elev.toLocaleString()}</div>
        <div class="elev-unit">feet · ${elevRank(hp.elev)}</div>
      </div>
    </div>

    <!-- STATS STRIP -->
    <div class="stats-strip">
      <div class="strip-stat">
        <div class="strip-lbl">Elevation gain</div>
        <div class="strip-val">${hp.gain > 0 ? hp.gain.toLocaleString() + ' ft' : 'Drive-up'}</div>
        <div class="strip-sub">on most popular route</div>
      </div>
      <div class="strip-stat">
        <div class="strip-lbl">Distance</div>
        <div class="strip-val">${hp.dist} mi</div>
        <div class="strip-sub">round trip</div>
      </div>
      <div class="strip-stat">
        <div class="strip-lbl">Martin difficulty</div>
        <div class="strip-val" style="color:${diffColor(hp.diff)}">${hp.diff} / 10</div>
        <div class="strip-sub">technical challenge</div>
      </div>
      <div class="strip-stat">
        <div class="strip-lbl">VanderHeide effort</div>
        <div class="strip-val">${hp.effort}</div>
        <div class="strip-sub">of 1000</div>
      </div>
    </div>

    <!-- DIFFICULTY + EFFORT -->
    <div class="section">
      <div class="section-title">Difficulty & effort breakdown</div>
      <div class="diff-card">
        <div class="diff-scale-wrap">
          <div class="diff-row">
            <div class="diff-label">Technical (Martin)</div>
            <div class="diff-track"><div class="diff-bar" style="width:${hp.diff/10*100}%;background:${diffColor(hp.diff)}"></div></div>
            <div class="diff-val" style="color:${diffColor(hp.diff)}">${hp.diff}/10</div>
          </div>
          <div class="diff-row">
            <div class="diff-label">Elevation gain</div>
            <div class="diff-track"><div class="diff-bar" style="width:${Math.min(hp.gain/25000*100,100)}%;background:#a3c47a"></div></div>
            <div class="diff-val">${hp.gain > 0 ? hp.gain.toLocaleString() + ' ft' : '—'}</div>
          </div>
          <div class="diff-row">
            <div class="diff-label">Distance</div>
            <div class="diff-track"><div class="diff-bar" style="width:${Math.min(hp.dist/56*100,100)}%;background:#a3c47a"></div></div>
            <div class="diff-val">${hp.dist} mi</div>
          </div>
          <div style="margin-top:0.75rem;font-size:11px;color:rgba(245,240,232,0.35);line-height:1.5">
            Martin Classification: subjective 0–10 technical difficulty rating.<br>
            Bars scaled to hardest US highpoint (Denali).
          </div>
        </div>
        <div class="effort-display">
          <div class="effort-num">${hp.effort}</div>
          <div class="effort-denom">/ 1000</div>
          <div class="effort-label">VanderHeide effort score</div>
          <div class="effort-rank">${effortRank(hp.effort)}</div>
        </div>
      </div>
    </div>

    <!-- TRIP REPORT -->
    <div class="section" style="padding-top:0">
      <div class="section-title">Trip report</div>
      ${isDone ? `
        <div class="trip-card">
          <div class="trip-header">
            <div class="trip-title">Summit log</div>
            <div class="trip-date">${dateStr}</div>
          </div>
          <div class="trip-meta">
            ${log.conditions ? `<div class="trip-meta-item"><div class="trip-meta-lbl">Conditions</div><div class="trip-meta-val">${log.conditions}</div></div>` : ''}
            ${log.partners ? `<div class="trip-meta-item"><div class="trip-meta-lbl">Partners</div><div class="trip-meta-val">${log.partners}</div></div>` : ''}
          </div>
          ${log.notes ? `<div class="trip-notes">"${log.notes}"</div>` : ''}
        </div>
      ` : `
        <div class="trip-card">
          <div class="no-summit">
            <div class="no-summit-icon">⛰</div>
            <div class="no-summit-text">You haven't logged a summit here yet.</div>
            <a href="index.html#log" class="log-btn">Log this summit</a>
          </div>
        </div>
      `}
    </div>

    <!-- LINKS -->
    <div class="section" style="padding-top:0">
      <div class="section-title">Resources</div>
      <div class="links-card">
        <a class="link-row" href="${hp.guide}" target="_blank">
          <div class="link-row-left">
            <div class="link-icon">📖</div>
            <div><div class="link-name">Full guide — highpoint.guide</div><div class="link-desc">Route details, photos, permit info, trip reports</div></div>
          </div>
          <div class="link-arrow">↗</div>
        </a>
        <a class="link-row" href="https://www.google.com/maps/search/${encodeURIComponent(hp.peak + ', ' + hp.name)}" target="_blank">
          <div class="link-row-left">
            <div class="link-icon">📍</div>
            <div><div class="link-name">Google Maps</div><div class="link-desc">${hp.lat.toFixed(4)}° N, ${Math.abs(hp.lng).toFixed(4)}° W</div></div>
          </div>
          <div class="link-arrow">↗</div>
        </a>
        <a class="link-row" href="https://www.alltrails.com/search?q=${encodeURIComponent(hp.peak)}" target="_blank">
          <div class="link-row-left">
            <div class="link-icon">🥾</div>
            <div><div class="link-name">AllTrails</div><div class="link-desc">Trail maps, user reviews, GPX tracks</div></div>
          </div>
          <div class="link-arrow">↗</div>
        </a>
      </div>
    </div>

    <!-- NEARBY -->
    <div class="section" style="padding-top:0">
      <div class="section-title">Nearby highpoints</div>
      <div class="nearby-grid">
        ${nearby.map(n => `
          <a class="nearby-card" href="peak.html?state=${n.state}">
            <div class="nearby-state">${n.name}</div>
            <div class="nearby-peak">${n.peak}</div>
            <div class="nearby-dist">${Math.round(n.km * 0.621)} mi away · ${n.elev.toLocaleString()} ft</div>
            <div class="nearby-badge ${sumMap[n.state] ? 'done' : 'todo'}">${sumMap[n.state] ? '✓ Done' : 'Not yet'}</div>
          </a>
        `).join('')}
      </div>
    </div>

    <!-- PREV / NEXT -->
    <div style="display:flex;justify-content:space-between;padding:0 2rem 3rem;max-width:900px;gap:1rem;flex-wrap:wrap">
      ${getPrevNext(hp)}
    </div>
  `;

  document.getElementById('page-content').innerHTML = html;
}

function getPrevNext(hp) {
  const sorted = [...HIGHPOINTS].sort((a,b) => b.elev - a.elev);
  const idx = sorted.findIndex(h => h.state === hp.state);
  const prev = sorted[idx-1];
  const next = sorted[idx+1];
  let out = '';
  if (prev) out += `<a href="peak.html?state=${prev.state}" style="font-size:13px;color:var(--moss-light);text-decoration:none;opacity:0.7;transition:opacity 0.15s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7">← ${prev.peak} (${prev.elev.toLocaleString()} ft)</a>`;
  else out += '<div></div>';
  if (next) out += `<a href="peak.html?state=${next.state}" style="font-size:13px;color:var(--moss-light);text-decoration:none;opacity:0.7;transition:opacity 0.15s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7">${next.peak} (${next.elev.toLocaleString()} ft) →</a>`;
  return out;
}

// ── INIT ──
const params = new URLSearchParams(window.location.search);
const stateCode = params.get('state');
const hp = HIGHPOINTS.find(h => h.state === stateCode);

if (hp) {
  buildPage(hp);
} else {
  document.getElementById('page-content').innerHTML = `
    <div style="text-align:center;padding:4rem 2rem">
      <p style="color:rgba(245,240,232,0.5);margin-bottom:1rem">State not found.</p>
      <a href="index.html" style="color:var(--moss)">← Back to map</a>
    </div>
  `;
}
</script>
</body>
</html>
